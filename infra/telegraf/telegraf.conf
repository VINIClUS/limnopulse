[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = "1s"
  omit_hostname = true

[[outputs.influxdb_v2]]
  urls = ["${INFLUXDB_URL}"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET_RAW}"

[[processors.starlark]]
  script = "/etc/telegraf/device_registry.star"

[[inputs.mqtt_consumer]]
  servers = ["tcp://mqtt-broker:1883"]
  topics = ["limnopulse/v1/devices/+/readings"]
  client_id = "limnopulse-telegraf-readings"
  qos = 1
  persistent_session = false
  data_format = "json_v2"
  tags = {source = "mqtt", schema_version = "1"}

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "limnopulse/v1/devices/+/readings"
    tags = "_/_/_/device_id/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "water_quality"
    timestamp_path = "ts"
    timestamp_format = "2006-01-02T15:04:05Z07:00"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "seq"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "temp_c"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "ph"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "do_mg_l"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "turbidity_ntu"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "salinity_ppt"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "battery_v"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi"
      type = "int"

[[inputs.mqtt_consumer]]
  servers = ["tcp://mqtt-broker:1883"]
  topics = ["limnopulse/v1/devices/+/health"]
  client_id = "limnopulse-telegraf-health"
  qos = 1
  persistent_session = false
  data_format = "json_v2"
  tags = {source = "mqtt", schema_version = "1"}

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "limnopulse/v1/devices/+/health"
    tags = "_/_/_/device_id/_"

  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "device_health"
    timestamp_path = "ts"
    timestamp_format = "2006-01-02T15:04:05Z07:00"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "seq"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "uptime_s"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "battery_v"
      type = "float"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi"
      type = "int"
