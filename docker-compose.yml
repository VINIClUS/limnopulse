services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"

  dynamodb-local:
    image: amazon/dynamodb-local:2.5.2
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    ports:
      - "8001:8000"

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: limnopulse
      DOCKER_INFLUXDB_INIT_PASSWORD: limnopulse-local-password
      DOCKER_INFLUXDB_INIT_ORG: limnopulse
      DOCKER_INFLUXDB_INIT_BUCKET: aquafarm_raw
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: limnopulse-local-token
    volumes:
      - influxdb-data:/var/lib/influxdb2

volumes:
  influxdb-data:
