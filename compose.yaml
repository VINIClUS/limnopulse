services:
  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no --maxmemory 128mb --maxmemory-policy allkeys-lfu
    ports:
      - "6379:6379"

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    command: -jar DynamoDBLocal.jar -sharedDb -dbPath ./data
    working_dir: /home/dynamodblocal
    volumes:
      - dynamodb_data:/home/dynamodblocal/data
    ports:
      - "8001:8000"

  influxdb:
    image: influxdb:2-alpine
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: limnopulse
      DOCKER_INFLUXDB_INIT_PASSWORD: local-dev-password
      DOCKER_INFLUXDB_INIT_ORG: limnopulse
      DOCKER_INFLUXDB_INIT_BUCKET: limnopulse_raw
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: local-dev-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    ports:
      - "8086:8086"

  mqtt-broker:
    image: eclipse-mosquitto:2
    volumes:
      - ./infra/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "127.0.0.1:1883:1883"

  telegraf:
    image: telegraf:1.32-alpine
    depends_on:
      - mqtt-broker
      - influxdb
    environment:
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: local-dev-token
      INFLUXDB_ORG: limnopulse
      INFLUXDB_BUCKET_RAW: limnopulse_raw
    volumes:
      - ./infra/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - ./infra/telegraf/device_registry.star:/etc/telegraf/device_registry.star:ro

  alert-evaluator:
    profiles: ["manual"]
    build:
      context: .
      dockerfile: Dockerfile.alert-evaluator
    depends_on:
      - dynamodb-local
      - influxdb
    environment:
      APP_ENV: local
      AWS_REGION: us-east-1
      DYNAMODB_DOMAIN_TABLE: LimnopulseDomain
      DYNAMODB_ENDPOINT_URL: http://dynamodb-local:8000
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: local-dev-token
      INFLUXDB_ORG: limnopulse
      INFLUXDB_BUCKET_RAW: limnopulse_raw
    command: ["run"]
    restart: "no"

volumes:
  dynamodb_data:
  influxdb_data:
